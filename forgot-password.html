<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>forgot password</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen p-5">

<div class="bg-white rounded-lg shadow-md flex w-full max-w-3xl overflow-hidden">


<div class="hidden md:flex w-1/2 bg-blue-50 items-center justify-center p-6">
<img src="undraw_forgot-password_nttj.svg" class="max-w-xs w-full">
</div>


<div class="w-full md:w-1/2 p-8">

<h2 class="text-2xl font-semibold text-center mb-2">
  Forgot Password
</h2>

    

<p class="text-sm text-gray-600 text-center mb-6">
Enter your email address and we will send you an otp to reset your password.
</p>

<form>

<label class="block mb-2 text-sm font-medium">Email</label>

<div class="flex items-center border rounded-md p-2 mb-4 focus-within:ring-2 focus-within:ring-blue-500">

<span class="material-symbols-outlined text-gray-400 mr-2">
alternate_email
</span>

<input type="email" 
placeholder="Enter your email" 
class="w-full outline-none">

</div>

<button type="button" 
onclick="window.location.href='otp.html'" 
class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
Send OTP
</button>

</form>

</div>

</div>

</body>
</html>
