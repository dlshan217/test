<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OTP Verification</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md text-center">

<h2 class="text-2xl font-semibold text-center mb-2">
otp verification
</h2>

<p class="text-gray-500 text-sm mb-6">
Enter the 6-digit code sent to your email
</p>


<div class="flex justify-center gap-3 mb-6">
<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
class="otp-box w-12 h-12 border rounded-lg text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">

<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
class="otp-box w-12 h-12 border rounded-lg text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">

<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
class="otp-box w-12 h-12 border rounded-lg text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">

<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
class="otp-box w-12 h-12 border rounded-lg text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">

<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
class="otp-box w-12 h-12 border rounded-lg text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">

<input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*"
class="otp-box w-12 h-12 border rounded-lg text-center text-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
</div>


<button id="verifyBtn"
class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 hover:shadow-md transition mb-4">
Verify
</button>

<p class="text-sm text-gray-600">
Didn’t receive the code?
<a href="#" class="text-blue-600 hover:underline">Resend OTP</a>
</p>

</div>

<script src="otp.js"></script>

</body>
</html>
